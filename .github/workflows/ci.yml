name: CI

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ----------------------------------------------------------------
  # 1) 轻量单元测试 / 静态检查（每次 push/PR 必跑）
  # ----------------------------------------------------------------
  test:
    name: Lint & Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (root + client)
        run: |
          npm ci
          cd client && npm ci && cd ..

      - name: Build client (vite)
        run: npm run build:client

      - name: Server syntax check
        run: |
          node --check server/src/index.js
          node -e "import('./server/src/routes/llmDefault.js').then(m => console.log('routes/llmDefault ok:', !!m.default))"

  # ----------------------------------------------------------------
  # 2) 构建并推送 Docker 镜像到 ghcr.io
  #    - main 分支：tag = sha-<short>
  #    - v*.*.* tag：tag = vX.Y.Z + latest
  # ----------------------------------------------------------------
  docker:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/sow-wbs
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=v2-latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=SOW WBS
            org.opencontainers.image.description=SOW → WBS 智能拆解系统
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
