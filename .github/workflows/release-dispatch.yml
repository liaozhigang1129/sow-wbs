name: Publish Release (Dispatch)

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "要发布的 tag（如 v2.20）"
        required: true
        default: "v2.20"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show resolved tag
        run: |
          echo "Tag: ${{ inputs.tag_name }}"
          git rev-parse "${{ inputs.tag_name }}"^{commit}
          git tag --list "${{ inputs.tag_name }}"

      - name: Create / Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          name: "${{ inputs.tag_name }} — hexai 兜底 LLM + Docker 部署"
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(inputs.tag_name, '-') }}
          body: |
            ## ${{ inputs.tag_name }} — hexai 兜底 LLM + Docker 部署

            ### 🛡️ 兜底 LLM

            - 新增 `GET /api/llm-default`：返回系统默认配置（**绝不返回 apiKey 明文**）
            - 后端 `__system_default__` 占位符 + env 自动 fallback
              （`generate.js` / `expandL3.js` / `llm.js#testLLM`）
            - 前端 `AIConfig` 面板新增「系统兜底 LLM」卡片 + 一键应用按钮
            - 顶部 badge「🛡️ 兜底 \<model\>」在用户未配 key 时自动出现
            - `onGenerate` 在无 key 时不再报错，静默使用兜底

            ### 🐳 Docker 部署

            - 多阶段 `Dockerfile`：`node:20-alpine` + `tini` + `curl` 健康检查
            - `docker-compose.yml` 包含 healthcheck + 端口映射 + env 注入
            - `.env.docker.example` 模板（含 hexai 兜底配置）
            - `DOCKER.md` 部署 / 升级 / 故障排查指南

            ### 📚 文档

            - `README.md` 顶部 5 个徽章（release / docker / ci / license / node）
            - `LICENSE`（MIT）
            - `CHANGELOG.md`（Keep a Changelog 规范）

            ### 📦 Docker 镜像

            ```bash
            docker pull ghcr.io/liaozhigang1129/sow-wbs:${{ inputs.tag_name }}
            docker pull ghcr.io/liaozhigang1129/sow-wbs:latest
            ```

            多架构：`linux/amd64` + `linux/arm64`，含 provenance + SBOM。
